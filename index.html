<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.T. ก้าวหน้า - ระบบดิจิทัล สภานักเรียน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen flex flex-col bg-[#f8faff]">
    <main class="flex-grow pb-24">
        <!-- Header Section -->
        <div class="bg-blue-600 text-white pt-10 pb-10 px-6 rounded-b-[2rem] relative z-20 shadow-xl">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <div class="relative">
                        <button id="profileBtn" class="w-12 h-12 bg-blue-400 rounded-full flex items-center justify-center text-lg font-bold border-2 border-blue-300 overflow-hidden shadow-sm transition-transform active:scale-95">
                            <i class="fas fa-user text-white"></i>
                        </button>
                        <!-- Profile Dropdown -->
                        <div id="profileDropdown" class="profile-dropdown p-4 border border-gray-100">
                            <div class="space-y-3 text-gray-800">
                                <div class="flex items-center gap-3 px-1 mb-2">
                                    <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center text-xs font-bold text-blue-600">
                                        <i class="fas fa-user"></i>
                                    </div>
                                    <div>
                                        <p class="text-xs font-bold" id="dropdownUserName">นักเรียน</p>
                                        <p class="text-[8px] text-gray-400">สมาชิก</p>
                                    </div>
                                </div>
                                <hr class="border-gray-100">
                                <a href="profile.html" class="flex items-center gap-3 text-sm font-medium hover:text-blue-500 transition-colors">
                                    <i class="fas fa-user-circle text-blue-500"></i>
                                    โปรไฟล์
                                </a>
                                <a href="edit-profile.html" class="flex items-center gap-3 text-sm font-medium hover:text-blue-500 transition-colors">
                                    <i class="fas fa-user-edit text-blue-500"></i>
                                    แก้ไขข้อมูล
                                </a>
                                
                                <div id="adminSection" class="hidden flex-col gap-2 pt-2">
                                    <hr class="border-gray-100 mb-2">
                                    <p class="text-[10px] text-indigo-500 uppercase font-bold px-1">ผู้ดูแลระบบ</p>
                                    <a href="admin-dashboard.html" class="flex items-center gap-3 text-xs font-bold text-indigo-600 hover:bg-indigo-50 p-2 rounded-xl transition-all">
                                        <i class="fas fa-user-shield w-4"></i>
                                        แดชบอร์ดแอดมิน
                                    </a>
                                </div>

                                <hr class="border-gray-100">
                                <button id="logoutBtn" class="w-full text-left text-xs font-medium text-red-500 mt-2 py-1">
                                    <i class="fas fa-sign-out-alt mr-2"></i>ออกจากระบบ
                                </button>
                            </div>
                        </div>
                    </div>
                    <div>
                        <p class="text-blue-100 text-[10px] font-light opacity-80">ยินดีต้อนรับกลับมา</p>
                        <h1 class="text-lg font-bold leading-tight" id="userName">กำลังโหลด...</h1>
                        <p class="text-blue-200 text-[10px] font-medium opacity-90" id="studentId">-</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Announcements Section -->
        <div class="px-6 mt-8">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-bold text-sm flex items-center gap-2 text-gray-800">
                    <i class="far fa-bell text-blue-500"></i>
                    ประกาศล่าสุด
                </h2>
                <a href="announcements.html" class="text-blue-500 text-xs">ดูทั้งหมด</a>
            </div>
            <div id="announcementList" class="space-y-4">
                <div class="bg-white p-6 rounded-3xl text-center border border-dashed border-gray-200">
                    <p class="text-gray-400 text-xs">กำลังโหลดประกาศ...</p>
                </div>
            </div>
        </div>

        <!-- Menu Grid -->
        <div class="px-6 mt-8 grid grid-cols-2 gap-4">
            <a href="points.html" class="bg-blue-50 p-5 rounded-3xl flex flex-col items-start gap-2 active:scale-95 transition-transform">
                <div class="bg-white p-2 rounded-lg shadow-sm text-blue-600">
                    <i class="fas fa-clipboard-list"></i>
                </div>
                <span class="font-medium text-blue-900 text-sm">บันทึกกิจกรรม</span>
            </a>
            <a href="report.html" class="bg-orange-50 p-5 rounded-3xl flex flex-col items-start gap-2 active:scale-95 transition-transform">
                <div class="bg-white p-2 rounded-lg shadow-sm text-orange-500">
                    <i class="fas fa-exclamation-triangle"></i>
                </div>
                <span class="font-medium text-orange-900 text-sm">แจ้งเรื่องร้องเรียน</span>
            </a>
            <a href="guide.html" class="bg-gray-50 p-5 rounded-3xl flex flex-col items-start gap-2 active:scale-95 transition-transform">
                <div class="bg-white p-2 rounded-lg shadow-sm text-gray-600">
                    <i class="fas fa-book-open"></i>
                </div>
                <span class="font-medium text-gray-900 text-sm">คู่มือการใช้งาน</span>
            </a>
            <a href="profile.html" class="bg-green-50 p-5 rounded-3xl flex flex-col items-start gap-2 active:scale-95 transition-transform">
                <div class="bg-white p-2 rounded-lg shadow-sm text-green-600">
                    <i class="fas fa-user-cog"></i>
                </div>
                <span class="font-medium text-green-900 text-sm">จัดการโปรไฟล์</span>
            </a>
        </div>
    </main>

    <!-- Bottom Nav -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 px-6 py-3 flex justify-between items-center z-50 h-20">
        <a href="index.html" class="nav-item active text-blue-600">
            <i class="fas fa-home text-xl mb-1"></i>
            <span class="text-[10px]">หน้าหลัก</span>
        </a>
        <a href="points.html" class="nav-item text-gray-400">
            <i class="fas fa-tasks text-xl mb-1"></i>
            <span class="text-[10px]">กิจกรรม</span>
        </a>
        <a href="announcements.html" class="nav-item text-gray-400">
            <i class="fas fa-bullhorn text-xl mb-1"></i>
            <span class="text-[10px]">ประกาศ</span>
        </a>
        <a href="report.html" class="nav-item text-gray-400">
            <i class="fas fa-exclamation-circle text-xl mb-1"></i>
            <span class="text-[10px]">แจ้งปัญหา</span>
        </a>
        <a href="profile.html" class="nav-item text-gray-400">
            <i class="fas fa-user-circle text-xl mb-1"></i>
            <span class="text-[10px]">โปรไฟล์</span>
        </a>
    </nav>

    <!-- Pop-up Overlay -->
    <div id="popupOverlay" class="fixed inset-0 bg-black/60 z-[9999] hidden flex items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] overflow-hidden shadow-2xl transform scale-90 transition-transform duration-300" id="popupContent">
            <div class="relative h-48 bg-gray-200">
                <img id="popupImg" src="" alt="News" class="w-full h-full object-cover">
                <button id="closePopupBtn" class="absolute top-4 right-4 w-8 h-8 bg-black/20 hover:bg-black/40 backdrop-blur-md rounded-full flex items-center justify-center text-white transition-colors">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="p-8">
                <div class="flex items-center gap-2 mb-3">
                    <span class="px-2 py-0.5 bg-blue-100 text-blue-600 rounded-md text-[10px] font-bold uppercase tracking-wider">ประกาศสำคัญ</span>
                    <span id="popupDate" class="text-[10px] text-gray-400 font-medium"></span>
                </div>
                <h3 id="popupTitle" class="text-xl font-bold text-gray-800 mb-3 leading-tight"></h3>
                <p id="popupText" class="text-sm text-gray-500 leading-relaxed mb-8 line-clamp-4"></p>
                <button id="closePopupConfirmBtn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-100 hover:bg-blue-700 transition-all">
                    รับทราบ
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db, logout, getAnnouncements } from "./js/data.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, getDoc, query, collection, where, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Auth Protection
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    const userData = userDoc.data();
                    document.getElementById('userName').textContent = userData.displayName || 'นักเรียน';
                    document.getElementById('dropdownUserName').textContent = userData.displayName || 'นักเรียน';
                    document.getElementById('studentId').textContent = `รหัสนักเรียน: ${userData.studentId || '-'}`;
                    
                    if (userData.role === 'admin') {
                        document.getElementById('adminSection')?.classList.remove('hidden');
                        document.getElementById('adminSection')?.classList.add('flex');
                    }
                }
                renderAnnouncements();
                checkPopup();
            } else {
                window.location.href = 'login.html';
            }
        });

        // Logout
        document.getElementById('logoutBtn')?.addEventListener('click', logout);

        // Announcements
        async function renderAnnouncements() {
            const container = document.getElementById('announcementList');
            const data = await getAnnouncements(3);
            if (data.length === 0) {
                container.innerHTML = '<div class="bg-white p-6 rounded-3xl text-center border border-gray-100 text-gray-400 text-xs">ไม่มีประกาศใหม่</div>';
                return;
            }
            container.innerHTML = data.map(a => `
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-50 flex gap-4 items-center active:scale-95 transition-transform">
                    <div class="w-16 h-16 bg-gray-100 rounded-xl overflow-hidden flex-shrink-0">
                        <img src="${a.image || 'https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=200&q=80'}" class="w-full h-full object-cover">
                    </div>
                    <div class="flex-grow min-w-0">
                        <h3 class="font-bold text-sm text-gray-800 truncate">${a.title}</h3>
                        <p class="text-xs text-gray-500 line-clamp-1 mt-1">${a.content}</p>
                        <p class="text-[10px] text-gray-400 mt-2">${a.date || ''}</p>
                    </div>
                </div>
            `).join('');
        }

        // Popup
        async function checkPopup() {
            try {
                const q = query(collection(db, "announcements"), where("isPopup", "==", true), orderBy("timestamp", "desc"), limit(1));
                const snapshot = await getDocs(q);
                if (!snapshot.empty) {
                    const data = snapshot.docs[0].data();
                    const id = snapshot.docs[0].id;
                    if (sessionStorage.getItem('popup_' + id) !== 'true') {
                        showPopup(data, id);
                    }
                }
            } catch (e) { console.error(e); }
        }

        function showPopup(news, id) {
            document.getElementById('popupTitle').textContent = news.title;
            document.getElementById('popupText').textContent = news.content;
            document.getElementById('popupImg').src = news.image || '';
            document.getElementById('popupDate').textContent = news.date;
            document.getElementById('popupOverlay').classList.remove('hidden');
            
            const close = () => {
                document.getElementById('popupOverlay').classList.add('hidden');
                sessionStorage.setItem('popup_' + id, 'true');
            };
            document.getElementById('closePopupBtn').onclick = close;
            document.getElementById('closePopupConfirmBtn').onclick = close;
        }

        // Dropdown Toggle
        document.getElementById('profileBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            document.getElementById('profileDropdown').classList.toggle('show');
        });
        window.onclick = () => document.getElementById('profileDropdown').classList.remove('show');
    </script>
</body>
</html>
