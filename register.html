<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.T. ก้าวหน้า - สมัครสมาชิก</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(180deg, #f0f7ff 0%, #ffffff 100%);
        }
        .register-card {
            background: white;
            border-radius: 2.5rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">
    <div class="w-full max-w-md text-center mb-8">
        <h1 class="text-2xl font-bold text-gray-800">สร้างบัญชีใหม่</h1>
        <p class="text-gray-500 text-sm mt-2">เข้าร่วมระบบดิจิทัล สภานักเรียน</p>
    </div>

    <div class="w-full max-w-md register-card p-8">
        <div class="flex bg-gray-100 p-1 rounded-2xl mb-8 text-sm">
            <button class="flex-1 py-3 rounded-xl font-medium text-gray-500" onclick="window.location.href='login.html'">เข้าสู่ระบบ</button>
            <button class="flex-1 py-3 rounded-xl font-medium bg-white shadow-sm text-blue-600">ลงทะเบียน</button>
        </div>

        <form id="registerForm" class="space-y-5">
            <div>
                <label class="text-xs font-bold text-gray-400 uppercase ml-1">ชื่อ-นามสกุล</label>
                <input type="text" id="regName" required class="w-full px-4 py-4 mt-1 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:border-blue-500 transition-all text-sm" placeholder="เช่น นายสมชาย ใจดี">
            </div>

            <div>
                <label class="text-xs font-bold text-gray-400 uppercase ml-1">รหัสนักเรียน</label>
                <input type="text" id="regId" required class="w-full px-4 py-4 mt-1 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:border-blue-500 transition-all text-sm" placeholder="เช่น 12345">
            </div>

            <div>
                <label class="text-xs font-bold text-gray-400 uppercase ml-1">รหัสผ่าน</label>
                <input type="password" id="regPass" required class="w-full px-4 py-4 mt-1 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:border-blue-500 transition-all text-sm" placeholder="••••••••">
            </div>

            <div>
                <label class="text-xs font-bold text-gray-400 uppercase ml-1">รหัสแอดมิน (ถ้ามี)</label>
                <input type="text" id="adminCode" class="w-full px-4 py-4 mt-1 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:border-blue-500 transition-all text-sm" placeholder="สำหรับคณะกรรมการ">
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-100 hover:bg-blue-700 transition-all transform active:scale-[0.98] mt-4">
                สร้างบัญชี
            </button>
        </form>
    </div>

    <script type="module">
        import { register } from "./js/data.js";

        const form = document.getElementById('registerForm');
        form.onsubmit = async (e) => {
            e.preventDefault();
            const name = document.getElementById('regName').value;
            const id = document.getElementById('regId').value;
            const pass = document.getElementById('regPass').value;
            const code = document.getElementById('adminCode').value;
            const btn = form.querySelector('button[type="submit"]');

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> กำลังสร้างบัญชี...';

            const role = code === 'Admin256923' ? 'admin' : 'student';
            const res = await register(name, id, pass, role);

            if (res.success) {
                window.location.href = 'index.html';
            } else {
                alert("เกิดข้อผิดพลาด: " + res.error.message);
                btn.disabled = false;
                btn.innerHTML = 'สร้างบัญชี';
            }
        };
    </script>
</body>
</html>
