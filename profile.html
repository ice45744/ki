<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.T. ก้าวหน้า - โปรไฟล์</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen flex flex-col pb-24">
    <div class="flex flex-col items-center pt-12 pb-8">
        <div class="w-24 h-24 rounded-full border-4 border-blue-500 p-1 mb-4">
            <div id="profileImageContainer" class="w-full h-full bg-blue-100 rounded-full flex items-center justify-center text-3xl font-bold text-blue-600 shadow-inner overflow-hidden">
                <img id="userPhoto" src="" class="hidden w-full h-full object-cover">
                <span id="userInitials">-</span>
            </div>
        </div>
        <h1 id="userName" class="text-xl font-bold">กำลังโหลด...</h1>
        <p id="userStudentId" class="text-gray-400 text-xs">รหัส: -</p>
    </div>

    <div class="px-6 grid grid-cols-2 gap-4 relative z-10">
        <div class="bg-white p-4 rounded-3xl text-center shadow-sm">
            <i class="fas fa-award text-yellow-500 text-lg mb-2"></i>
            <div id="userPoints" class="font-bold text-lg">0</div>
            <div class="text-[10px] text-gray-400">แต้มความดี</div>
        </div>
        <div class="bg-white p-4 rounded-3xl text-center shadow-sm">
            <i class="fas fa-recycle text-green-500 text-lg mb-2"></i>
            <div id="userStamps" class="font-bold text-lg">0</div>
            <div class="text-[10px] text-gray-400">แสตมป์ขยะ</div>
        </div>
    </div>

    <div class="mt-8 px-6 space-y-3">
        <a href="edit-profile.html" class="bg-white p-5 rounded-3xl flex justify-between items-center shadow-sm">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-blue-50 rounded-xl flex items-center justify-center text-blue-500">
                    <i class="fas fa-user-edit text-sm"></i>
                </div>
                <span class="font-medium text-sm">แก้ไขข้อมูลส่วนตัว</span>
            </div>
            <i class="fas fa-chevron-right text-gray-300 text-xs"></i>
        </a>
        <div id="settingsBtn" class="bg-white p-5 rounded-3xl flex justify-between items-center shadow-sm cursor-pointer">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-gray-50 rounded-xl flex items-center justify-center text-gray-500">
                    <i class="fas fa-cog text-sm"></i>
                </div>
                <span class="font-medium text-sm">ตั้งค่าระบบ</span>
            </div>
            <i class="fas fa-chevron-right text-gray-300 text-xs"></i>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="fixed inset-0 z-[100] hidden">
        <div class="absolute inset-0 bg-black/50 backdrop-blur-sm"></div>
        <div class="absolute bottom-0 left-0 right-0 bg-white dark:bg-slate-800 rounded-t-[3rem] p-8 shadow-2xl transform translate-y-0 transition-transform duration-300">
            <div class="w-12 h-1.5 bg-gray-200 dark:bg-slate-700 rounded-full mx-auto mb-8"></div>
            <h2 class="text-xl font-bold mb-6">ตั้งค่าระบบ</h2>
            
            <div class="space-y-6">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-blue-50 dark:bg-blue-900/20 rounded-2xl flex items-center justify-center text-blue-500">
                            <i class="fas fa-moon"></i>
                        </div>
                        <div>
                            <p class="font-medium text-sm">โหมดมืด (Dark Mode)</p>
                            <p class="text-[10px] text-gray-400">ปรับเปลี่ยนการแสดงผลให้สบายตา</p>
                        </div>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="darkModeSwitch" class="sr-only peer">
                        <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer dark:bg-gray-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-blue-600"></div>
                    </label>
                </div>
            </div>

            <button id="closeSettings" class="w-full bg-gray-100 dark:bg-slate-700 text-gray-800 dark:text-white py-4 rounded-2xl font-bold mt-8">ปิดหน้าต่าง</button>
        </div>
    </div>

    <div class="mt-8 px-6">
        <button id="logoutBtn" class="w-full bg-red-50 text-red-500 py-4 rounded-3xl font-bold text-sm flex items-center justify-center gap-3 border border-red-100">
            <i class="fas fa-sign-out-alt"></i>
            ออกจากระบบ
        </button>
    </div>

    <div class="mt-auto text-center py-8">
        <p class="text-[10px] text-gray-300 uppercase tracking-widest">S.T. Digital System v1.0.0</p>
        <p class="text-[10px] text-gray-300">พัฒนาโดยสภานักเรียนโรงเรียน</p>
    </div>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 px-6 py-3 flex justify-between items-center z-50 h-20">
        <a href="index.html" class="nav-item">
            <i class="fas fa-home"></i>
            <span>หน้าหลัก</span>
        </a>
        <a href="points.html" class="nav-item">
            <i class="fas fa-tasks"></i>
            <span>กิจกรรม</span>
        </a>
        <a href="announcements.html" class="nav-item">
            <i class="fas fa-bullhorn"></i>
            <span>ประกาศ</span>
        </a>
        <a href="scan.html" class="nav-item">
            <i class="fas fa-qrcode text-xl mb-1"></i>
            <span class="text-[10px]">สแกน</span>
        </a>
        <a href="report.html" class="nav-item">
            <i class="fas fa-exclamation-circle"></i>
            <span>แจ้งปัญหา</span>
        </a>
        <a href="profile.html" class="nav-item active">
            <i class="fas fa-user-circle"></i>
            <span>โปรไฟล์</span>
        </a>
    </nav>

    <script type="module">
        import { auth, getUserData, logout } from './js/data.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const userName = document.getElementById('userName');
        const userStudentId = document.getElementById('userStudentId');
        const userPoints = document.getElementById('userPoints');
        const userStamps = document.getElementById('userStamps');
        const userPhoto = document.getElementById('userPhoto');
        const userInitials = document.getElementById('userInitials');
        const logoutBtn = document.getElementById('logoutBtn');

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // Initial load from cache
                const initialResult = await getUserData(user.uid, true);
                if (initialResult.success) {
                    updateProfileUI(initialResult.data);
                }

                // Background refresh from server
                getUserData(user.uid, false).then(result => {
                    if (result.success) {
                        updateProfileUI(result.data);
                    }
                });
            } else {
                window.location.href = 'login.html';
            }
        });

        function updateProfileUI(data) {
            userName.textContent = data.displayName || 'ไม่มีชื่อ';
            userStudentId.textContent = `รหัส: ${data.studentId || '-'}`;
            userPoints.textContent = data.points || 0;
            userStamps.textContent = data.wasteStamps || 0;

            if (data.photoURL) {
                userPhoto.src = data.photoURL;
                userPhoto.classList.remove('hidden');
                userInitials.classList.add('hidden');
            } else if (data.displayName) {
                userInitials.textContent = data.displayName.charAt(0).toUpperCase();
                userPhoto.classList.add('hidden');
                userInitials.classList.remove('hidden');
            }
        }

        logoutBtn.addEventListener('click', () => {
            if(confirm('ยืนยันการออกจากระบบ?')) {
                logout();
            }
        });

        // Settings Logic
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsModal = document.getElementById('settingsModal');
        const closeSettings = document.getElementById('closeSettings');
        const darkModeSwitch = document.getElementById('darkModeSwitch');

        settingsBtn.addEventListener('click', () => settingsModal.classList.remove('hidden'));
        closeSettings.addEventListener('click', () => settingsModal.classList.add('hidden'));
        
        darkModeSwitch.addEventListener('change', () => {
            document.body.classList.toggle('dark-mode', darkModeSwitch.checked);
            localStorage.setItem('dark-mode', darkModeSwitch.checked ? 'enabled' : 'disabled');
        });

        if (localStorage.getItem('dark-mode') === 'enabled') {
            document.body.classList.add('dark-mode');
            darkModeSwitch.checked = true;
        }
    </script>
    <script src="js/theme.js"></script>
</body>
</html>
