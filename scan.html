<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.T. ก้าวหน้า - สแกน QR Code</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; }
        #reader { width: 100% !important; border: none !important; border-radius: 2rem !important; overflow: hidden !important; }
        #reader__scan_region { background: white !important; }
        #reader__dashboard_section_csr button {
            background-color: #2563eb !important;
            color: white !important;
            padding: 0.5rem 1rem !important;
            border-radius: 0.75rem !important;
            font-weight: 600 !important;
            font-size: 0.875rem !important;
            border: none !important;
            margin-top: 1rem !important;
        }
    </style>
</head>
<body class="bg-[#f8faff] min-h-screen flex flex-col pb-24">
    <div class="p-6 pt-12">
        <h1 class="text-xl font-bold flex items-center gap-3">
            <span class="w-8 h-8 bg-blue-50 rounded-xl flex items-center justify-center text-blue-500">
                <i class="fas fa-qrcode text-sm"></i>
            </span>
            สแกน QR Code
        </h1>
        <p class="text-gray-500 text-xs mt-1">สแกนรหัสเพื่อบันทึกกิจกรรมหรือรับแต้ม</p>
    </div>

    <div class="px-6 flex-grow">
        <div class="bg-white p-4 rounded-[2.5rem] shadow-sm border border-gray-100 overflow-hidden">
            <div id="reader"></div>
        </div>

        <div id="resultCard" class="hidden mt-6 bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100 animate-bounce-in">
            <div class="flex items-center gap-4">
                <div id="resultIcon" class="w-12 h-12 rounded-2xl flex items-center justify-center text-xl">
                    <i class="fas fa-check"></i>
                </div>
                <div>
                    <h3 id="resultTitle" class="font-bold text-gray-800">สำเร็จ</h3>
                    <p id="resultMessage" class="text-xs text-gray-500"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 px-6 py-3 flex justify-between items-center z-50 h-20">
        <a href="index.html" class="nav-item">
            <i class="fas fa-home"></i>
            <span>หน้าหลัก</span>
        </a>
        <a href="points.html" class="nav-item">
            <i class="fas fa-tasks"></i>
            <span>กิจกรรม</span>
        </a>
        <a href="scan.html" class="nav-item active text-blue-600">
            <i class="fas fa-qrcode text-xl mb-1"></i>
            <span class="text-[10px]">สแกน</span>
        </a>
        <a href="announcements.html" class="nav-item">
            <i class="fas fa-bullhorn"></i>
            <span>ประกาศ</span>
        </a>
        <a href="profile.html" class="nav-item">
            <i class="fas fa-user-circle"></i>
            <span>โปรไฟล์</span>
        </a>
    </nav>

    <script type="module">
        import { auth, db } from './js/data.js';
        import { doc, getDoc, updateDoc, increment, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let html5QrCode;

        async function onScanSuccess(decodedText, decodedResult) {
            console.log(`Scan Result: ${decodedText}`);
            if (html5QrCode) {
                await html5QrCode.stop();
            }

            try {
                // Logic: Expecting JSON or specific ID format
                // Example QR Content: {"type": "points", "amount": 10, "activity": "ขยะรีไซเคิล"}
                const data = JSON.parse(decodedText);
                const user = auth.currentUser;

                if (!user) {
                    showResult("ผิดพลาด", "กรุณาเข้าสู่ระบบก่อนใช้งาน", "bg-red-50 text-red-500");
                    return;
                }

                if (data.type === 'points') {
                    await updateDoc(doc(db, "users", user.uid), {
                        wasteStamps: increment(data.amount || 0)
                    });

                    await addDoc(collection(db, "transactions"), {
                        userId: user.uid,
                        type: "receive_points",
                        amount: data.amount,
                        activity: data.activity,
                        timestamp: new Date().toISOString()
                    });

                    showResult("สำเร็จ", `ได้รับ ${data.amount} แสตมป์ จาก: ${data.activity}`, "bg-green-50 text-green-500");
                } else {
                    showResult("แจ้งเตือน", "รูปแบบ QR Code ไม่ถูกต้อง", "bg-orange-50 text-orange-500");
                }
            } catch (e) {
                console.error("Invalid QR:", e);
                showResult("ผิดพลาด", "ไม่สามารถอ่านข้อมูล QR Code นี้ได้", "bg-red-50 text-red-500");
            }

            // Restart scanner after 3 seconds
            setTimeout(startScanner, 3000);
        }

        function showResult(title, msg, classes) {
            const card = document.getElementById('resultCard');
            const icon = document.getElementById('resultIcon');
            const t = document.getElementById('resultTitle');
            const m = document.getElementById('resultMessage');

            t.textContent = title;
            m.textContent = msg;
            icon.className = `w-12 h-12 rounded-2xl flex items-center justify-center text-xl ${classes}`;
            card.classList.remove('hidden');
            
            if (classes.includes('green')) {
                icon.innerHTML = '<i class="fas fa-check"></i>';
            } else {
                icon.innerHTML = '<i class="fas fa-exclamation-triangle"></i>';
            }

            setTimeout(() => card.classList.add('hidden'), 5000);
        }

        function startScanner() {
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            
            html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
                .catch(err => {
                    console.error("Error starting scanner:", err);
                    document.getElementById('reader').innerHTML = `
                        <div class="p-8 text-center">
                            <i class="fas fa-camera-slash text-gray-200 text-4xl mb-4"></i>
                            <p class="text-xs text-gray-400">ไม่สามารถเข้าถึงกล้องได้<br>กรุณาอนุญาตการเข้าถึงกล้อง</p>
                        </div>
                    `;
                });
        }

        // Start when auth is ready
        auth.onAuthStateChanged(user => {
            if (user) {
                startScanner();
            } else {
                window.location.href = 'login.html';
            }
        });
    </script>
</body>
</html>
