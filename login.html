<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.T. ก้าวหน้า - เข้าสู่ระบบ</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(180deg, #f0f7ff 0%, #ffffff 100%);
        }
        .login-card {
            background: white;
            border-radius: 2.5rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">
    <div class="w-full max-w-md text-center mb-8">
        <div class="w-20 h-20 bg-blue-600 rounded-[1.5rem] flex items-center justify-center mx-auto mb-6 shadow-lg shadow-blue-200">
            <i class="fas fa-chart-line text-white text-3xl"></i>
        </div>
        <h1 class="text-2xl font-bold text-gray-800">S.T. ก้าวหน้า</h1>
        <p class="text-gray-500 text-sm mt-2">ระบบดิจิทัล สภานักเรียน</p>
    </div>

    <div class="w-full max-w-md login-card p-8">
        <div class="flex bg-gray-100 p-1 rounded-2xl mb-8 text-sm">
            <button class="flex-1 py-3 rounded-xl font-medium bg-white shadow-sm text-blue-600">เข้าสู่ระบบ</button>
            <button class="flex-1 py-3 rounded-xl font-medium text-gray-500" onclick="window.location.href='register.html'">ลงทะเบียน</button>
        </div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label class="text-xs font-bold text-gray-400 uppercase ml-1">รหัสนักเรียน</label>
                <div class="relative mt-1">
                    <i class="fas fa-hashtag absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="text" required class="w-full pl-12 pr-4 py-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:border-blue-500 transition-all text-sm" placeholder="เช่น 12345">
                </div>
            </div>

            <div>
                <label class="text-xs font-bold text-gray-400 uppercase ml-1">รหัสผ่าน</label>
                <div class="relative mt-1">
                    <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="password" required class="w-full pl-12 pr-4 py-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:border-blue-500 transition-all text-sm" placeholder="••••••••">
                </div>
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-100 hover:bg-blue-700 transition-all transform active:scale-[0.98] mt-4">
                เข้าสู่ระบบ
            </button>
        </form>
    </div>

    <script type="module">
        import { auth, login } from "./js/data.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // If already logged in, go to home
        onAuthStateChanged(auth, (user) => {
            if (user) window.location.href = 'index.html';
        });

        const form = document.getElementById('loginForm');
        form.onsubmit = async (e) => {
            e.preventDefault();
            const id = form.querySelector('input[type="text"]').value;
            const pass = form.querySelector('input[type="password"]').value;
            const btn = form.querySelector('button[type="submit"]');
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> กำลังตรวจสอบ...';
            
            const res = await login(id, pass);
            if (res.success) {
                window.location.href = 'index.html';
            } else {
                alert("ข้อมูลไม่ถูกต้อง กรุณาลองใหม่");
                btn.disabled = false;
                btn.innerHTML = 'เข้าสู่ระบบ';
            }
        };
    </script>
</body>
</html>
